<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>MagicHome</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="82">🪄</text></svg>'/>
<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>

<div id="intro">
  <div id="introMsg" class="intro-msg">반가워요</div>
  <div class="intro-brand">MAGICHOME</div>
  <div class="intro-skip">클릭하여 건너뛰기</div>
</div>

<div id="bgImg"></div>
<div id="threeBg"></div>
<div id="vig"></div>

<div id="shell">
  <header class="bar">
    <div class="bar-l">
      <div id="clock" class="pill glass"></div>
      <div id="weather" class="pill glass hidden" title="클릭하면 새로고침"></div>
    </div>
    <div class="brand glass">
      <span class="brand-e">🪄✨</span>
      <span class="brand-t">MAGICHOME</span>
    </div>
    <div class="bar-r">
      <button id="btnCollection" class="abtn glass" type="button" title="모음 열기"><span class="ai">✨</span><span class="al">모음</span></button>
      <button id="btnNote" class="abtn glass" type="button" title="메모"><span class="ai">📝</span><span class="al">메모</span></button>
      <button id="btnAdd" class="abtn glass" type="button" title="앱 추가"><span class="ai">＋</span><span class="al">앱</span></button>
      <button id="btnSet" class="abtn glass" type="button" title="설정"><span class="ai">⚙</span><span class="al">설정</span></button>
    </div>
  </header>

  <main class="hero">
    <div class="sbar glass">
      <div class="sbar-logo">🪄</div>
      <select id="eng" aria-label="검색엔진"></select>
      <input id="sinput" type="text" placeholder="검색어 또는 URL 입력" autocomplete="off" spellcheck="false"/>
      <button id="sbtn" type="button">검색</button>
    </div>

    <section id="curveWrap" class="sec">
      <button id="cL" class="nb side l" type="button">‹</button>
      <div id="cVP"><div id="cTrack"></div></div>
      <button id="cR" class="nb side r" type="button">›</button>
    </section>

    <section id="gridWrap" class="sec hidden">
      <div class="ghead">
        <button id="gL" class="nb" type="button">‹</button>
        <div id="gLabel" class="ghint">1 / 1</div>
        <button id="gR" class="nb" type="button">›</button>
      </div>
      <div id="gVP"><div id="gTrack"></div></div>
    </section>
  </main>

  <div id="notes"></div>
</div>

<div id="backdrop" class="hidden"></div>

<!-- 설정 패널 -->
<aside id="setPanel" class="panel hidden">
  <div class="ph"><h2>설정</h2><button type="button" class="xbtn" data-close>✕</button></div>
  <div class="pb">
    <label class="fld"><span>레이아웃</span>
      <select id="sLayout"><option value="curve">커브 다이얼</option><option value="grid">일반 배열</option></select>
    </label>
    <label class="fld"><span>검색 엔진</span><select id="sEng"></select></label>
    <label class="fld"><span>처음 문구</span><input id="sWelcome" type="text" maxlength="80" placeholder="처음 표시될 문구"/></label>

    <div class="sg">
      <label class="cr"><input id="tClock" type="checkbox"/><span>시간 표시</span></label>
      <label class="cr"><input id="tWeather" type="checkbox"/><span>날씨 표시</span></label>
      <label class="cr"><input id="tSkipIntro" type="checkbox"/><span>시작 화면 건너뛰기</span></label>
      <label class="cr"><input id="tMouse3d" type="checkbox"/><span>Three.js 마우스 반응 효과</span></label>
    </div>

    <div class="divider"></div>

    <label class="fld"><span>배경 타입</span>
      <select id="sBgType"><option value="three">Three.js 기본</option><option value="image">이미지</option></select>
    </label>
    <label class="fld"><span>이미지 링크</span><input id="sBgUrl" type="text" placeholder="https://..."/></label>
    <label class="fld"><span>이미지 업로드</span><input id="sBgFile" type="file" accept="image/*"/></label>
    <label class="fld"><span>이미지 표시</span>
      <select id="sBgFit"><option value="cover">자르기(cover)</option><option value="contain">맞추기(contain)</option><option value="stretch">늘리기(stretch)</option></select>
    </label>
    <div class="btns">
      <button id="applyBg" type="button" class="pbtn">배경 적용</button>
      <button id="resetAll" type="button" class="dbtn">전체 초기화</button>
    </div>
    <p class="muted">업로드 이미지는 브라우저에 저장됩니다.</p>
  </div>
</aside>

<!-- 앱/폴더 추가 모달 -->
<div id="appModal" class="modal hidden">
  <div class="mcard">
    <div class="ph"><h3 id="amTitle">앱 추가</h3><button type="button" class="xbtn" data-close>✕</button></div>
    <form id="appForm" class="pb">
      <label class="fld"><span>유형</span>
        <select id="fType"><option value="app">앱</option><option value="folder">폴더</option></select>
      </label>
      <label class="fld"><span>이름</span><input id="fName" type="text" maxlength="24" required/></label>

      <div id="appFields">
        <label class="fld"><span>저장 위치</span><select id="fParent"></select></label>
        <label class="fld"><span>URL / 프로토콜</span><input id="fUrl" type="text" placeholder="https://..., vscode://..."/></label>
        <label class="fld"><span>아이콘 방식</span>
          <select id="fIconMode"><option value="auto">자동 불러오기</option><option value="link">이미지 링크</option><option value="upload">이미지 업로드</option></select>
        </label>
        <label class="fld"><span>아이콘 링크</span><input id="fIconUrl" type="text" placeholder="https://..."/></label>
        <label class="fld"><span>아이콘 업로드</span><input id="fIconFile" type="file" accept="image/*"/></label>
        <label class="cr"><input id="fLaunch" type="checkbox"/><span>모음 버튼에 포함</span></label>
      </div>

      <div id="folderFields" class="hidden">
        <label class="fld"><span>폴더 이모지</span><input id="fEmoji" type="text" maxlength="4" placeholder="🪄"/></label>
      </div>

      <div class="btns">
        <button type="submit" class="pbtn">저장</button>
        <button type="button" data-close>취소</button>
      </div>
      <p class="muted">vscode://, steam:// 같은 프로토콜 링크는 연결 가능합니다.</p>
    </form>
  </div>
</div>

<!-- 폴더 모달 -->
<div id="folderModal" class="modal hidden">
  <div class="mcard mcard-wide">
    <div class="ph">
      <h3 id="fmTitle">폴더</h3>
      <div class="ftools">
        <button id="fmOpenAll" type="button" class="pbtn sm">전체 열기</button>
        <button id="fmAddApp" type="button" class="sm">앱 추가</button>
        <button type="button" class="xbtn" data-close>✕</button>
      </div>
    </div>
    <div id="fmApps" class="fapps"></div>
  </div>
</div>

<div id="qmenu" class="qmenu hidden"></div>
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
