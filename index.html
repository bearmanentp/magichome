<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MagicHome</title>
  <link id="favicon" rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="82">🪄</text></svg>' />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>

  <div id="intro">
    <div id="introMessage" class="intro-message">반가워요. 오늘도 매직하게 시작해볼까요?</div>
    <div class="intro-brand">MAGICHOME</div>
    <button id="introSkipBtn" type="button" class="intro-skip">건너뛰기</button>
  </div>

  <div id="bgSolidLayer"></div>
  <div id="bgEmojiLayer"></div>
  <div id="bgImageLayer"></div>
  <canvas id="threeBg"></canvas>
  <div id="vignette"></div>

  <div id="shell">
    <header class="topbar">
      <div class="infoDock">
        <div id="clockBox" class="mini-pill glass hidden"></div>
        <div id="weatherBox" class="mini-pill glass hidden" title="클릭 시 새로고침"></div>
      </div>
      <div class="brandBadge glass">
        <span class="brandEmoji">🪄</span>
        <span class="brandText">MAGICHOME</span>
      </div>
      <div class="topActions">
        <button id="openAllBtn" class="act-btn glass" title="모음 실행"><span>✨</span><em>모음</em></button>
        <button id="addNoteBtn" class="act-btn glass" title="메모 추가"><span>📝</span><em>메모</em></button>
        <button id="addAppBtn" class="act-btn glass" title="앱/폴더 추가"><span>＋</span><em>앱</em></button>
        <button id="settingsBtn" class="act-btn glass" title="설정"><span>⚙</span><em>설정</em></button>
      </div>
    </header>

    <main class="hero">
      <div class="searchWrap glass">
        <div class="searchLogo">🪄</div>
        <div class="engineWrap">
          <select id="engineSelect" class="sel"></select>
        </div>
        <input id="searchInput" class="searchInput" type="text" placeholder="검색어를 입력하거나 URL을 입력하세요…" autocomplete="off" spellcheck="false" />
        <button id="searchBtn" class="searchBtn" type="button">검색</button>
      </div>

      <section id="curveSection" class="appSection">
        <button id="curveLeft" class="sideBtn left" type="button">‹</button>
        <div id="curveViewport"><div id="curveTrack"></div></div>
        <button id="curveRight" class="sideBtn right" type="button">›</button>
      </section>

      <section id="gridSection" class="appSection hidden">
        <div class="gridHead">
          <button id="gridLeft" class="navBtn" type="button">‹</button>
          <span id="gridPageLabel" class="pageLabel">1 / 1</span>
          <button id="gridRight" class="navBtn" type="button">›</button>
        </div>
        <div id="gridViewport"><div id="gridTrack"></div></div>
      </section>
    </main>

    <div id="notesLayer"></div>
  </div>

  <div id="modalBackdrop" class="hidden"></div>

  <aside id="settingsPanel" class="panel hidden">
    <div class="panelHeader">
      <h2>⚙️ 설정</h2>
      <button class="closeBtn" data-close type="button">✕</button>
    </div>
    <div class="panelBody">
      <div class="section-title">개인화 및 레이아웃</div>
      <div class="field">
        <label class="field-label">앱 배열 방식</label>
        <div class="sel-wrap">
          <select id="layoutSelect" class="sel">
            <option value="curve">🎠 안드로이드 커브 다이얼</option>
            <option value="grid">⊞ 슬라이드 앱 그리드</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="field-label">기본 검색 엔진</label>
        <div class="sel-wrap"><select id="settingsEngineSelect" class="sel"></select></div>
      </div>
      <div class="field">
        <label class="field-label">첫 환영 메시지</label>
        <input id="welcomeInput" class="inp" type="text" maxlength="80" />
      </div>
      <div class="field row-field">
        <label class="field-label">인트로 로딩 켜기</label>
        <label class="toggle-label"><input id="showIntroToggle" type="checkbox" class="toggle-inp" /><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
      </div>

      <div class="section-title">위젯 및 메모</div>
      <div class="field row-field">
        <label class="field-label">🕐 시간/날짜 표시</label>
        <label class="toggle-label"><input id="showClockToggle" type="checkbox" class="toggle-inp" /><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
      </div>
      <div class="field row-field">
        <label class="field-label">🌤 날씨 표시</label>
        <label class="toggle-label"><input id="showWeatherToggle" type="checkbox" class="toggle-inp" /><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
      </div>
      <div class="field row-field">
        <label class="field-label" style="color: var(--accent);">📌 메모 자동 핀 고정</label>
        <label class="toggle-label"><input id="autoPinToggle" type="checkbox" class="toggle-inp" /><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
      </div>

      <div class="section-title">탭 아이콘 (Favicon)</div>
      <div class="field">
        <div class="seg-ctrl" id="favModeSeg">
          <button type="button" data-val="emoji" class="seg-btn active">🪄 매직</button>
          <button type="button" data-val="link" class="seg-btn">🔗 링크</button>
          <button type="button" data-val="upload" class="seg-btn">📤 업로드</button>
        </div>
        <input type="hidden" id="favModeVal" value="emoji" />
      </div>
      <div class="field" id="favLinkField" style="display:none"><input id="favIconUrl" class="inp" placeholder="https://..." /></div>
      <div class="field" id="favUploadField" style="display:none">
        <label class="file-label"><input id="favIconUpload" type="file" accept="image/*" class="file-inp" /><span class="file-btn">📂 파일 선택</span><span id="favFileName" class="file-name">파일 없음</span></label>
      </div>
      <div class="btn-row"><button id="applyFavBtn" class="primary-btn" type="button">탭 아이콘 적용</button></div>

      <div class="section-title">배경 테마</div>
      <div class="field">
        <div class="sel-wrap">
          <select id="bgTypeSelect" class="sel">
            <option value="three">✨ Three.js 3D</option>
            <option value="solid">🎨 단색</option>
            <option value="gradient">🌈 그라데이션</option>
            <option value="image">🖼 이미지</option>
            <option value="emoji">🎈 이모지</option>
          </select>
        </div>
      </div>
      <div id="bgThreeOptions" class="bgSubFields">
        <div class="field">
          <div class="sel-wrap">
            <select id="threeSceneSelect" class="sel">
              <option value="stars">🌌 은하수</option>
              <option value="matrix">🧬 매트릭스</option>
              <option value="waves">🌊 웨이브</option>
            </select>
          </div>
        </div>
        <div class="field row-field"><label class="field-label">마우스 반응</label><label class="toggle-label"><input id="threeMouseToggle" type="checkbox" class="toggle-inp" /><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>
      </div>
      <div id="bgSolidOptions" class="bgSubFields hidden"><div class="field"><input id="bgSolidColor" class="inp" type="color" value="#121016" /></div></div>
      <div id="bgGradientOptions" class="bgSubFields hidden">
        <div class="field"><label class="field-label">시작 색상</label><input id="bgGrad1" class="inp" type="color" value="#1f1a3a" /></div>
        <div class="field"><label class="field-label">종료 색상</label><input id="bgGrad2" class="inp" type="color" value="#0d0a12" /></div>
        <div class="field"><label class="field-label">각도</label><input id="bgGradAngle" class="inp" type="number" min="0" max="360" value="135" /></div>
      </div>
      <div id="bgImageOptions" class="bgSubFields hidden">
        <div class="field"><input id="bgImageUrl" class="inp" type="text" placeholder="이미지 URL" /></div>
        <div class="field"><label class="file-label"><input id="bgImageUpload" type="file" accept="image/*" class="file-inp" /><span class="file-btn">📂 업로드</span><span id="bgFileName" class="file-name">파일 없음</span></label></div>
        <div class="field"><div class="sel-wrap"><select id="bgFitSelect" class="sel"><option value="cover">자르기</option><option value="contain">맞추기</option><option value="stretch">늘리기</option></select></div></div>
      </div>
      <div id="bgEmojiOptions" class="bgSubFields hidden"><div class="field"><input id="bgEmojiInput" class="inp" type="text" value="✨🎈🪄🍀🌸🔥" /></div></div>

      <div class="btn-row" style="margin-top:20px;">
        <button id="applyBgBtn" class="primary-btn" type="button">배경 저장</button>
        <button id="resetDataBtn" class="danger-btn" type="button">초기화</button>
      </div>
    </div>
  </aside>

  <div id="appModal" class="modal hidden">
    <div class="modalCard">
      <div class="panelHeader">
        <h3 id="appModalTitle">새 앱 등록</h3>
        <button class="closeBtn" data-close type="button">✕</button>
      </div>
      <form id="appForm" class="panelBody">
        <div class="field">
          <div class="seg-ctrl" id="entryTypeSeg">
            <button type="button" data-val="app" class="seg-btn active">📱 앱</button>
            <button type="button" data-val="folder" class="seg-btn">📁 폴더</button>
          </div>
          <input type="hidden" id="entryType" value="app" />
        </div>

        <div id="appOnlyFields">
          <div class="field"><label class="field-label">이름 *</label><input id="appName" class="inp" type="text" maxlength="20" /></div>
          <div class="field"><label class="field-label">위치</label><div class="sel-wrap"><select id="parentSelect" class="sel"></select></div></div>
          <div class="field"><label class="field-label">URL / 프로토콜 *</label><input id="appUrl" class="inp" type="text" placeholder="https://..." /></div>
          <div class="field">
            <label class="field-label">아이콘 방식</label>
            <div class="seg-ctrl" id="iconModeSeg">
              <button type="button" data-val="auto" class="seg-btn active">자동</button>
              <button type="button" data-val="link" class="seg-btn">링크</button>
              <button type="button" data-val="upload" class="seg-btn">업로드</button>
            </div>
            <input type="hidden" id="iconModeVal" value="auto" />
          </div>
          <div class="field" id="iconLinkField" style="display:none"><input id="appIconUrl" class="inp" type="text" placeholder="https://..." /></div>
          <div class="field" id="iconUploadField" style="display:none"><label class="file-label"><input id="appIconUpload" type="file" accept="image/*" class="file-inp" /><span class="file-btn">📂 탐색</span><span id="iconFileName" class="file-name">파일 없음</span></label></div>
          <div class="field row-field"><label class="field-label">✨ 모음 자동 실행 포함</label><label class="toggle-label"><input id="launchGroupToggle" type="checkbox" class="toggle-inp" /><span class="toggle-track"><span class="toggle-thumb"></span></span></label></div>
        </div>

        <div id="folderOnlyFields" class="hidden">
          <div class="field"><label class="field-label">폴더 이름 *</label><input id="folderName" class="inp" type="text" maxlength="20" /></div>
          <div class="field"><label class="field-label">이모지</label><input id="folderEmoji" class="inp emoji-inp" type="text" maxlength="4" placeholder="🪄" /></div>
        </div>

        <div class="btn-row"><button type="submit" class="primary-btn">저장</button><button type="button" class="ghost-btn" data-close>취소</button></div>
      </form>
    </div>
  </div>

  <div id="folderModal" class="modal hidden">
    <div class="modalCard folderCard">
      <div class="panelHeader">
        <h3 id="folderTitle">폴더</h3>
        <div class="folderCtrlBar">
          <button id="folderOpenAllBtn" class="primary-btn small-btn" type="button">전체 실행</button>
          <button id="folderAddAppBtn" class="ghost-btn small-btn" type="button">앱 추가</button>
          <button class="closeBtn" data-close type="button">✕</button>
        </div>
      </div>
      <div id="folderApps" class="folderApps"></div>
    </div>
  </div>

  <div id="quickMenu" class="quickMenu hidden"></div>
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
